# Job Search Pipeline Configuration
# Used by /apply, /pipeline, and supporting scripts

# --- Common Form Answers (for clipboard package) ---
form_answers:
  full_name: "Jared Hawkins"
  email: "hawkins.jared@gmail.com"
  phone: ""  # Fill in
  linkedin: "https://www.linkedin.com/in/jaredhawkins/"
  location: "Seattle, WA"
  visa_status: "US Citizen"
  salary_expectation: "$100-250K"
  portfolio: ""  # Fill in if applicable
  willing_to_relocate: "Open to remote or Seattle-area hybrid"

# --- Search Filters ---
filters:
  locations:
    - "Seattle, WA"
    - "Remote"
  salary_floor: 100000

# --- Archetype Routing Keywords ---
# Each archetype has a list of keywords matched against JD title + body
# First match wins. If no match, defaults to "operations"
archetypes:
  product_management:
    keywords:
      - "product manager"
      - "product owner"
      - "product lead"
      - "product ops"
      - "product operations"
      - "AI PM"
      - "technical product manager"
      - "TPM"
    template:
      summary_variant: "product_management"
      headline: "Principal Product Manager | AI Systems & Scalable Platforms"
      max_bullets: 11
      tag_priority:
        - "product_strategy"
        - "product_launch"
        - "shipping"
        - "roadmap"
        - "mvp"
        - "gtm"
        - "data_pipelines"
        - "ai"
        - "cross_functional"
        - "analytics"
        - "revenue"
      skills_emphasis:
        - "Product Leadership"
        - "AI & Emerging Tech"
        - "Engineering & Architecture"
        - "Data Systems"

  operations:
    keywords:
      - "operations manager"
      - "program manager"
      - "chief of staff"
      - "revops"
      - "revenue operations"
    template:
      summary_variant: "operations"
      headline: "Operations & Program Leader | Process Design & Scalable Systems"
      max_bullets: 11
      tag_priority:
        - "process"
        - "cross_functional"
        - "scaling"
        - "delivery"
        - "systems"
        - "prioritization"
        - "transformation"
        - "agile"
        - "okrs"
        - "operations"
        - "automation"
      skills_emphasis:
        - "Product Leadership"
        - "Data Systems"
        - "Engineering & Architecture"

  government:
    keywords:
      - "city manager"
      - "county"
      - "municipal"
      - "public sector"
      - "government"
      - "federal"
      - "GS-"
      - "public administration"
    template:
      summary_variant: "government"
      headline: "Technology & Product Leader | Public Sector Systems"
      max_bullets: 11
      tag_priority:
        - "stakeholder"
        - "process"
        - "data"
        - "compliance"
        - "cross_functional"
        - "analytics"
        - "systems"
        - "scaling"
        - "advisory_board"
        - "feedback_loops"
      skills_emphasis:
        - "Product Leadership"
        - "Data Systems"
        - "Engineering & Architecture"

  customer_success:
    keywords:
      - "customer success"
      - "account manager"
      - "TAM"
      - "technical account"
      - "solutions"
      - "client"
    template:
      summary_variant: "customer_success"
      headline: "Customer Success & Product Leader | Retention, Revenue & Analytics"
      max_bullets: 11
      tag_priority:
        - "retention"
        - "customer"
        - "revenue"
        - "analytics"
        - "feedback_loops"
        - "advisory_board"
        - "partnerships"
        - "upsell"
        - "adoption"
        - "engagement"
        - "stakeholder"
      skills_emphasis:
        - "Product Leadership"
        - "Data Systems"
        - "AI & Emerging Tech"

  ai_technical:
    keywords:
      - "AI"
      - "machine learning"
      - "ML engineer"
      - "technical advisor"
      - "fractional"
      - "AI strategy"
    template:
      summary_variant: "ai_technical"
      headline: "AI Product Leader | Systems Architecture & Hands-On Building"
      max_bullets: 11
      tag_priority:
        - "ai"
        - "llm"
        - "agentic"
        - "architecture"
        - "data_pipelines"
        - "data_modeling"
        - "api"
        - "infrastructure"
        - "builder"
        - "data_science"
        - "automation"
      skills_emphasis:
        - "AI & Emerging Tech"
        - "Engineering & Architecture"
        - "Data Systems"
        - "Product Leadership"

# --- Vault Paths ---
vault:
  application_tracker: "~/Documents/Second Brain/02_Projects/Job Search/R - Application Tracker.md"
  outreach_log: "~/Documents/Second Brain/02_Projects/Job Search/Scout + Dossier/R - Outreach Log.md"
  pipeline_notes: "~/Documents/Second Brain/99_System/Daily Notes/"

# --- Scout Data Paths ---
scout:
  seen: "~/.scout/seen.md"
  blacklist: "~/.scout/blacklist.md"

# --- Dedup Ledger ---
ledger:
  path: "pipeline/data/ledger.tsv"

# --- Discovery: Adzuna API ---
adzuna:
  app_id: ""       # Get from https://developer.adzuna.com
  api_key: ""      # Same dashboard
  country: "us"
  results_per_page: 50
  max_pages: 3     # 150 results per query max

# --- Discovery: Search Queries ---
# Each query runs against Adzuna. ~30 queries covering all lanes.
search_queries:
  # Product Management
  - query: "product manager"
    location: "Seattle"
  - query: "product manager"
    location: ""
  - query: "senior product manager"
    location: "Seattle"
  - query: "principal product manager"
    location: ""
  - query: "product owner"
    location: "Seattle"
  - query: "AI product manager"
    location: ""
  - query: "technical product manager"
    location: "Seattle"
  - query: "product operations"
    location: ""

  # Operations / Program Management
  - query: "program manager"
    location: "Seattle"
  - query: "operations manager"
    location: "Seattle"
  - query: "chief of staff"
    location: ""
  - query: "revenue operations manager"
    location: ""

  # Government / Public Sector
  - query: "city manager"
    location: "Washington state"
  - query: "public administration manager"
    location: "Washington state"
  - query: "government program manager"
    location: ""
  - query: "municipal operations"
    location: "Washington state"

  # Customer Success / RevOps
  - query: "customer success manager"
    location: "Seattle"
  - query: "technical account manager"
    location: ""
  - query: "solutions manager"
    location: "Seattle"

  # AI / Technical
  - query: "AI strategy"
    location: ""
  - query: "machine learning product"
    location: ""
  - query: "AI product lead"
    location: ""
  - query: "technical advisor AI"
    location: ""

  # Broader titles
  - query: "director of product"
    location: "Seattle"
  - query: "head of product"
    location: ""
  - query: "VP operations"
    location: "Seattle"
  - query: "director of operations"
    location: "Seattle"
  - query: "head of operations"
    location: ""
  - query: "product lead"
    location: "Seattle"
  - query: "product lead"
    location: ""

# --- Discovery: Email Alerts ---
email_alerts:
  gmail_label: "Job Alerts"
  senders:
    - name: "LinkedIn"
      from_pattern: "jobs-noreply@linkedin.com"
    - name: "Indeed"
      from_pattern: "alert@indeed.com"
    - name: "Built In"
      from_pattern: "noreply@builtin.com"
    - name: "Idealist"
      from_pattern: "alerts@idealist.org"
    - name: "GovernmentJobs"
      from_pattern: "noreply@governmentjobs.com"
    - name: "USAJobs"
      from_pattern: "usajobs@notifications.usajobs.gov"
    - name: "HigherEdJobs"
      from_pattern: "jobs@higheredjobs.com"
    - name: "ClimateTechList"
      from_pattern: "jobs@climatetechlist.com"

# --- Discovery: Career Page Monitoring ---
careers:
  urls: {}  # Populated by careers.py --seed
  fetch_timeout: 15
  max_concurrent: 10
